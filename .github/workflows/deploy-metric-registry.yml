name: Deploy Metric Registry Streamlit App

on:
  push:
    branches:
      - main
    paths:
      - 'metric_registry_app.py'
      - 'environment.yml'
      - 'snowflake.yml'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  deploy:
    name: Deploy to Snowflake
    runs-on: ubuntu-latest
    environment: production
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ACCOUNTADMIN
      SNOWFLAKE_WAREHOUSE: COMPUTE_WH
      SNOWFLAKE_DATABASE: METRIC_REGISTRY_DB
      SNOWFLAKE_SCHEMA: REGISTRY
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0

      - name: Test Snowflake connection
        run: snow connection test -x

      - name: Run metric_registry_git_integration.sql
        run: snow sql -f metric_registry_git_integration.sql -x

      - name: Deploy Streamlit app
        run: snow streamlit deploy --replace -x

      - name: Log deployment via SQL
        run: |
          snow sql -q "INSERT INTO METRIC_REGISTRY_DB.REGISTRY.GIT_DEPLOYMENT_LOG
            (BRANCH_OR_TAG, APP_NAME, STATUS, DETAILS)
            VALUES ('main', 'METRIC_REGISTRY_APP', 'SUCCESS',
            'GitHub Actions deploy - commit ${{ github.sha }}')" -x